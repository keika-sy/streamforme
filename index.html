<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>AnimeStream - Nonton Anime Subtitle Indonesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pull-to-Refresh Indicator -->
    <div class="ptr-indicator" id="ptrIndicator">
        <div class="ptr-spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="nav-brand" onclick="app.goHome(); return false;">
            <i class="fas fa-play-circle"></i>
            <span class="brand-text">AnimeStream</span>
        </a>

        <div class="nav-links">
            <button class="nav-link active" data-page="home" onclick="app.goHome()">
                <i class="fas fa-home"></i> <span>Beranda</span>
            </button>
            <button class="nav-link" data-page="ongoing" onclick="app.loadOngoing()">
                <i class="fas fa-fire"></i> <span>Ongoing</span>
            </button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari anime..." onkeyup="app.handleSearch(event)" autocomplete="off" autocorrect="off" autocapitalize="off">
            <button onclick="app.search()" aria-label="Search">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <button class="mobile-menu-btn" onclick="app.toggleMobileMenu()" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <span class="mobile-menu-title">Menu</span>
            <button class="mobile-menu-close" onclick="app.toggleMobileMenu()" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="mobile-search">
            <input type="text" id="mobileSearchInput" placeholder="Cari anime..." onkeyup="app.handleMobileSearch(event)" autocomplete="off" autocorrect="off" autocapitalize="off">
            <button onclick="app.mobileSearch()" aria-label="Search">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <nav class="mobile-nav">
            <a href="#" class="mobile-nav-link" onclick="app.goHome(); app.toggleMobileMenu(); return false;">
                <i class="fas fa-home"></i> Beranda
            </a>
            <a href="#" class="mobile-nav-link" onclick="app.loadOngoing(); app.toggleMobileMenu(); return false;">
                <i class="fas fa-fire"></i> Ongoing
            </a>
        </nav>
    </div>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="app.toggleMobileMenu()"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bottom-nav-item active" data-page="home" onclick="app.goHome()">
            <i class="fas fa-home"></i>
            <span>Beranda</span>
        </button>
        <button class="bottom-nav-item" data-page="ongoing" onclick="app.loadOngoing()">
            <i class="fas fa-fire"></i>
            <span>Ongoing</span>
        </button>
        <button class="bottom-nav-item" onclick="app.focusSearch()">
            <i class="fas fa-search"></i>
            <span>Cari</span>
        </button>
    </nav>

    <!-- Footer -->
    <footer class="footer">
        <p>AnimeStream - Nonton Anime Subtitle Indonesia</p>
        <p style="margin-top: 6px; font-size: 0.75rem; opacity: 0.6;">Powered by OtakuDesu API</p>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
